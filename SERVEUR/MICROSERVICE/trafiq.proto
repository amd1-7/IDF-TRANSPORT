syntax = "proto3";
option go_package = "./p";

message InputUser {
    string ville = 1;
    string bus = 2;
    string arret = 3;
}

message OutputServer {
    string temps_initial = 1;
    string temps_reel = 2;
}

service TrafiqService{
    rpc GetInput(InputUser) returns (OutputServer){}
}
/* -m grpc_tools.protoc -I. --python_out=. --grpc_python_out=. trafiq.proto  */